<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCM • Craving Machine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .result { animation: pop 0.4s; }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .run-btn { transition: all 0.2s; }
        .selected { border-color: #10b981 !important; background-color: #10b98120 !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen pb-12">
<div class="max-w-md mx-auto p-4">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-emerald-400">The Craving Machine</h1>
        <button onclick="showSettings()" class="text-xs text-zinc-400 hover:text-white">⚙️ Settings</button>
    </div>

    <!-- STATUS + TOTAL RUNS -->
    <div class="bg-zinc-900 rounded-2xl p-4 mb-6 flex justify-between items-center">
        <div class="text-center text-emerald-400 text-sm font-medium flex items-center gap-2">
            <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
            TCM ACTIVE
        </div>
        <div class="text-right">
            <div class="text-xs text-zinc-500">Total Runs</div>
            <div id="totalRuns" class="text-emerald-400 font-mono text-2xl font-bold">0</div>
        </div>
    </div>

    <!-- TRIGGER -->
    <div class="bg-zinc-900 rounded-2xl p-5 mb-6">
        <h2 class="text-lg font-semibold mb-4">Log Interaction</h2>
        
        <div class="mb-4">
            <input id="personInput" list="personDatalist" 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-lg focus:outline-none focus:border-emerald-500"
                   placeholder="Name">
            <datalist id="personDatalist"></datalist>
        </div>

        <div id="notesSection" class="mb-4 hidden">
            <label class="block text-xs text-zinc-400 mb-1">Notes</label>
            <textarea id="notesInput" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 h-20 resize-y focus:outline-none focus:border-emerald-500" placeholder="Optional notes..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <button onclick="selectCategory(0)" id="btnNo"
                    class="category-btn py-4 rounded-2xl text-sm font-medium border-2 border-zinc-700">Said No</button>
            <button onclick="selectCategory(1)" id="btnComp"
                    class="category-btn py-4 rounded-2xl text-xs font-medium border-2 border-zinc-700">Compliment/Command</button>
        </div>
        <button onclick="selectCategory(2)" id="btnOther"
                class="w-full py-3 rounded-2xl text-sm font-medium border-2 border-zinc-700 bg-zinc-800 hover:bg-zinc-700 mb-4">Other</button>

        <div class="flex items-center gap-3">
            <button onclick="runTCM()" id="runButton"
                    class="run-btn flex-1 py-5 bg-emerald-500 hover:bg-emerald-600 transition text-xl font-semibold rounded-2xl">
                RUN TCM
            </button>
            <button onclick="checkCounts()" 
                    class="text-xs text-zinc-400 underline hover:text-zinc-300">Check Count</button>
        </div>
    </div>

    <!-- INLINE RESULT -->
    <div id="resultPanel" class="hidden bg-zinc-900 rounded-2xl p-6 mb-6 result text-center">
        <div id="resultContent" class="text-6xl font-black"></div>
        <div id="extraText" class="mt-4 text-emerald-400 text-lg"></div>
        <div id="clearButtons" class="hidden mt-6"></div>
        <button onclick="hideResult()" class="mt-6 w-full py-3 text-zinc-400 text-sm underline">Close</button>
    </div>

    <!-- COLLAPSIBLE RECENT RUNS -->
    <div class="bg-zinc-900 rounded-2xl p-5">
        <div onclick="toggleHistory()" class="flex justify-between items-center cursor-pointer">
            <h2 class="text-sm text-zinc-400">Recent Runs <span id="historyCount" class="font-mono"></span></h2>
            <span id="historyArrow" class="text-zinc-400 text-xl transition-transform">▼</span>
        </div>
        <div id="historyContainer" class="hidden mt-4">
            <div id="historyList" class="space-y-3 text-sm"></div>
        </div>
    </div>

</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-md w-full mx-4">
        <div class="flex justify-between mb-8">
            <h2 class="text-2xl font-bold">TCM Settings</h2>
            <button onclick="hideSettings()" class="text-zinc-400 text-xl">✕</button>
        </div>
        <button onclick="showHiddenStats()" class="w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium text-zinc-300 mb-8">
            Open Internal Stats
        </button>
        <div class="pt-6 border-t border-zinc-700">
            <button onclick="resetAll()" class="w-full py-3 text-xs text-zinc-500 hover:text-zinc-400 underline">
                Reset All Data
            </button>
        </div>
    </div>
</div>

<!-- HIDDEN STATS MODAL -->
<div id="hiddenModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-md w-full mx-4 max-h-[90vh] overflow-auto">
        <div class="flex justify-between mb-6">
            <h2 class="text-2xl font-bold text-emerald-400">TCM Internal Stats</h2>
            <button onclick="hideHiddenStats()" class="text-zinc-400 text-xl">✕</button>
        </div>
        <div class="space-y-6">
            <div class="bg-zinc-800 rounded-2xl p-5">
                <div class="text-sm text-zinc-400">TOTAL RUNS EVER</div>
                <div id="totalRunsBig" class="text-5xl font-mono text-emerald-400 mt-1"></div>
            </div>
            <div class="bg-zinc-800 rounded-2xl p-5">
                <div onclick="toggleCounts()" class="flex justify-between items-center cursor-pointer">
                    <div class="text-sm text-zinc-400">PERSON COUNTS <span id="personCountNum" class="font-mono"></span></div>
                    <span id="countsArrow" class="text-xl transition-transform">▼</span>
                </div>
                <div id="allCounts" class="hidden mt-4 space-y-2 text-sm max-h-60 overflow-auto pr-2"></div>
            </div>
            <div class="bg-zinc-800 rounded-2xl p-5">
                <div class="text-sm text-zinc-400 mb-3">EDITABLE SETTINGS</div>
                <div class="mb-4">
                    <label class="block text-xs text-zinc-400 mb-1">Probabilities (%)</label>
                    <input id="probsInput" class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 font-mono text-sm" value="5,10,20,30,40,50,60">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-zinc-400 mb-1">Block min length</label>
                        <input id="blockMinInput" type="number" class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 font-mono" value="2">
                    </div>
                    <div>
                        <label class="block text-xs text-zinc-400 mb-1">Block max length</label>
                        <input id="blockMaxInput" type="number" class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 font-mono" value="10">
                    </div>
                </div>
                <button onclick="saveSettings()" class="mt-6 w-full py-4 bg-emerald-500 hover:bg-emerald-600 rounded-2xl font-semibold">
                    SAVE SETTINGS
                </button>
            </div>
            <div class="bg-zinc-800 rounded-2xl p-5">
                <div onclick="toggleCurrentStats()" class="flex justify-between items-center cursor-pointer">
                    <div class="text-sm text-rose-400 font-medium">Current Stats (Do not open)</div>
                    <span id="statsArrow" class="text-xl transition-transform">▼</span>
                </div>
                <div id="currentStatsContent" class="hidden mt-4">
                    <div class="bg-emerald-900/30 border border-emerald-500/30 rounded-2xl p-5">
                        <div class="text-sm text-emerald-400 font-medium">CURRENT BLOCK</div>
                        <div id="blockInfo" class="text-4xl font-mono text-emerald-400 mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
        <button onclick="hideHiddenStats()" class="mt-8 w-full py-3 text-zinc-400 text-sm underline">Close</button>
    </div>
</div>

<script>
// ============== DATA ==============
let tcmData = { persons: {}, currentProb: null, blockRemaining: 0, history: [], totalRuns: 0 };
let settings = { probs: [5,10,20,30,40,50,60], blockMin: 2, blockMax: 10 };
let selectedCategory = 'no';
let historyVisible = false;
let countsVisible = false;
let statsVisible = false;

// ============== LOAD / SAVE ==============
function loadData() {
    const saved = localStorage.getItem('tcmData');
    if (saved) tcmData = JSON.parse(saved);
    const savedSettings = localStorage.getItem('tcmSettings');
    if (savedSettings) settings = JSON.parse(savedSettings);
}
function saveData() {
    localStorage.setItem('tcmData', JSON.stringify(tcmData));
}
function saveSettings() {
    const probsStr = document.getElementById('probsInput').value.trim();
    settings.probs = probsStr.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
    if (settings.probs.length === 0) settings.probs = [5,10,20,30,40,50,60];
    settings.blockMin = parseInt(document.getElementById('blockMinInput').value) || 2;
    settings.blockMax = parseInt(document.getElementById('blockMaxInput').value) || 10;
    if (settings.blockMax < settings.blockMin) settings.blockMax = settings.blockMin + 1;
    localStorage.setItem('tcmSettings', JSON.stringify(settings));
    hideHiddenStats();
    alert("✅ Settings saved!");
}

// ============== RENDER ==============
function renderAll() {
    renderDatalist();
    renderHistory();
    document.getElementById('totalRuns').textContent = tcmData.totalRuns;
    document.getElementById('totalRunsBig').textContent = tcmData.totalRuns;
}

function renderDatalist() {
    const dl = document.getElementById('personDatalist');
    dl.innerHTML = '';
    Object.keys(tcmData.persons).sort().forEach(n => {
        const o = document.createElement('option'); o.value = n; dl.appendChild(o);
    });
}

function renderHistory() {
    document.getElementById('historyCount').textContent = `(${tcmData.history.length})`;
    const container = document.getElementById('historyList');
    container.innerHTML = '';
    tcmData.history.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'flex justify-between py-2 border-b border-zinc-800 last:border-0 items-start';
        let notesHTML = entry.notes ? `<div class="text-xs text-zinc-500 italic mt-1">"${entry.notes}"</div>` : '';
        div.innerHTML = `
            <div class="flex-1">
                <span class="font-medium">${entry.person}</span> 
                <span class="text-xs text-zinc-500">(${entry.category})</span>
                ${notesHTML}
            </div>
            <div class="text-right">
                <div class="${entry.rewarded ? 'text-emerald-400' : 'text-amber-400'}">${entry.rewarded ? 'GRANTED' : 'NOTHING'}</div>
                <div class="text-[10px] text-zinc-500 mt-1">${entry.time}</div>
            </div>
        `;
        container.appendChild(div);
    });
}

function renderPersonCounts() {
    const countsDiv = document.getElementById('allCounts');
    countsDiv.innerHTML = '';
    const countNum = Object.keys(tcmData.persons).length;
    document.getElementById('personCountNum').textContent = `(${countNum})`;
    if (countNum === 0) {
        countsDiv.innerHTML = '<div class="text-zinc-500 italic text-center py-4">No people tracked yet</div>';
        return;
    }
    Object.keys(tcmData.persons).sort().forEach(name => {
        const p = tcmData.persons[name];
        const d = document.createElement('div');
        d.className = 'flex justify-between bg-zinc-950 rounded-xl px-4 py-3 text-sm';
        d.innerHTML = `<div class="font-medium">${name}</div><div class="font-mono">No:${p.no} • Cmd:${p.comp} • Other:${p.other||0}</div>`;
        countsDiv.appendChild(d);
    });
}

// ============== TOGGLES ==============
function toggleHistory() {
    historyVisible = !historyVisible;
    document.getElementById('historyContainer').classList.toggle('hidden', !historyVisible);
    document.getElementById('historyArrow').style.transform = historyVisible ? 'rotate(180deg)' : '';
}
function toggleCounts() {
    countsVisible = !countsVisible;
    document.getElementById('allCounts').classList.toggle('hidden', !countsVisible);
    document.getElementById('countsArrow').style.transform = countsVisible ? 'rotate(180deg)' : '';
    if (countsVisible) renderPersonCounts();
}
function toggleCurrentStats() {
    statsVisible = !statsVisible;
    document.getElementById('currentStatsContent').classList.toggle('hidden', !statsVisible);
    document.getElementById('statsArrow').style.transform = statsVisible ? 'rotate(180deg)' : '';
}

// ============== MODALS ==============
function showHiddenStats() {
    document.getElementById('hiddenModal').classList.remove('hidden');
    document.getElementById('blockInfo').textContent = tcmData.currentProb ? 
        `${tcmData.currentProb}% • ${tcmData.blockRemaining} runs left` : 'Next run starts new block';
    renderAll();
    renderPersonCounts();   // ← now always up to date
}
function hideHiddenStats() { document.getElementById('hiddenModal').classList.add('hidden'); }
function showSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
function hideSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

// ============== CATEGORY ==============
function selectCategory(n) {
    selectedCategory = n === 0 ? 'no' : n === 1 ? 'comp' : 'other';
    ['btnNo','btnComp','btnOther'].forEach(id => document.getElementById(id).classList.remove('selected'));
    if (n===0) document.getElementById('btnNo').classList.add('selected');
    if (n===1) document.getElementById('btnComp').classList.add('selected');
    if (n===2) document.getElementById('btnOther').classList.add('selected');
    document.getElementById('notesSection').classList.toggle('hidden', n !== 2);
}

// ============== PRIME BLOCK ==============
function primeBlock() {
    tcmData.currentProb = settings.probs[Math.floor(Math.random() * settings.probs.length)];
    const range = settings.blockMax - settings.blockMin + 1;
    tcmData.blockRemaining = Math.floor(Math.random() * range) + settings.blockMin;
}

// ============== RUN TCM ==============
function runTCM() {
    if (tcmData.blockRemaining <= 0 || !tcmData.currentProb) primeBlock();

    let person = document.getElementById('personInput').value.trim();
    if (!person) person = "Anonymous";

    const runBtn = document.getElementById('runButton');

    const rewarded = Math.random() < (tcmData.currentProb / 100);
    tcmData.blockRemaining--;
    tcmData.totalRuns++;

    let newCount = 0;
    let showLimit = false;
    let notes = '';

    // Always create entry for Anonymous too so it shows in person counts
    if (!tcmData.persons[person]) tcmData.persons[person] = {no:0, comp:0, other:0};

    if (selectedCategory !== 'other') {
        tcmData.persons[person][selectedCategory]++;
        newCount = tcmData.persons[person][selectedCategory];
        showLimit = (newCount % 5 === 0);
    } else {
        tcmData.persons[person].other = (tcmData.persons[person].other || 0) + 1;
        notes = document.getElementById('notesInput').value.trim();
    }

    const entry = {
        time: new Date().toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }),
        person,
        category: selectedCategory === 'no' ? 'No' : selectedCategory === 'comp' ? 'Cmd' : 'Other',
        rewarded,
        notes: notes || undefined
    };
    tcmData.history.unshift(entry);
    if (tcmData.history.length > 30) tcmData.history.pop();

    saveData();
    renderAll();

    runBtn.textContent = '✓ LOGGED';
    runBtn.classList.add('bg-emerald-600','scale-95');
    setTimeout(() => { runBtn.textContent = 'RUN TCM'; runBtn.classList.remove('bg-emerald-600','scale-95'); }, 1000);

    const resultHTML = rewarded ? `<span class="text-emerald-400">REWARD<br>GRANTED</span>` : `<span class="text-amber-400">NOTHING</span>`;
    let extra = showLimit ? `Limit reached: ${newCount} times with ${person}` : '';
    showResult(resultHTML, extra, false);
}

function checkCounts() {
    const person = document.getElementById('personInput').value.trim() || "Anonymous";
    if (!tcmData.persons[person]) {
        showResult(`<span class="text-2xl text-amber-400">No records yet</span>`, `for ${person}`, true);
        return;
    }
    const p = tcmData.persons[person];
    const html = `<span class="text-xl font-medium">${person}</span>`;
    const extra = `Said No: ${p.no} • Compliment/Command: ${p.comp} • Other: ${p.other||0}`;
    showResult(html, extra, true);
}

function showResult(mainHTML, extraHTML, isCheckMode) {
    const panel = document.getElementById('resultPanel');
    document.getElementById('resultContent').innerHTML = mainHTML;
    document.getElementById('extraText').innerHTML = extraHTML || '';

    const clearDiv = document.getElementById('clearButtons');
    clearDiv.innerHTML = '';
    clearDiv.classList.toggle('hidden', !isCheckMode);

    if (isCheckMode) {
        const person = document.getElementById('personInput').value.trim() || "Anonymous";
        clearDiv.innerHTML = `
            <button onclick="clearPerson('${person}')" 
                    class="text-xs text-zinc-400 underline hover:text-zinc-300 px-4 py-2">Clear this person's data</button>
        `;
    }
    panel.classList.remove('hidden');
}

function clearPerson(person) {
    if (!confirm(`Clear ALL data for ${person}?`)) return;
    delete tcmData.persons[person];
    tcmData.history = tcmData.history.filter(e => e.person !== person);
    saveData();
    renderAll();
    hideResult();
}

function hideResult() {
    document.getElementById('resultPanel').classList.add('hidden');
    document.getElementById('personInput').value = '';
    document.getElementById('notesInput').value = '';
}

function resetAll() {
    if (!confirm('Are you sure you want to delete ALL data?')) return;
    const confirmText = prompt('Type DELETE to confirm:');
    if (confirmText === 'DELETE') {
        localStorage.clear();
        location.reload();
    }
}

// ============== INIT ==============
window.onload = () => {
    loadData();
    renderAll();
    selectCategory(0);
    toggleHistory();
};
</script>
</body>
</html>
